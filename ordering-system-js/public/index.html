<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuickOrder</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #faf9f7;
      --text: #1a1916;
      --muted: #9b9690;
      --accent: #c8602a;
      --line: #e8e5e0;
      --surface: #fff;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .wrap {
      text-align: center;
      padding: 3rem 2rem;
      animation: rise 0.65s ease both;
    }
    @keyframes rise { from { opacity:0; transform: translateY(20px); } to { opacity:1; transform:none; } }

    .eyebrow {
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1.2rem;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(3rem, 8vw, 5.5rem);
      font-weight: 400;
      letter-spacing: -1px;
      line-height: 1;
      margin-bottom: 1rem;
    }

    .tagline {
      font-size: 0.93rem;
      color: var(--muted);
      margin-bottom: 3rem;
    }

    .divider {
      width: 36px;
      height: 1px;
      background: var(--line);
      margin: 0 auto 3rem;
    }

    nav {
      display: flex;
      flex-direction: column;
      max-width: 260px;
      margin: 0 auto;
      border: 1px solid var(--line);
      border-radius: 3px;
      overflow: hidden;
    }

    nav a {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.1rem 1.4rem;
      text-decoration: none;
      color: var(--text);
      font-size: 0.87rem;
      font-weight: 400;
      letter-spacing: 0.04em;
      background: var(--surface);
      border-bottom: 1px solid var(--line);
      transition: background 0.18s, color 0.18s;
    }
    nav a:last-child { border-bottom: none; }
    nav a:hover { background: var(--accent); color: #fff; }
    nav a:hover .arrow { opacity: 1; }

    .arrow { font-size: 0.75rem; opacity: 0.3; transition: opacity 0.18s; }

    footer {
      margin-top: 4rem;
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <p class="eyebrow">Food Ordering System</p>
    <h1>QuickOrder</h1>
    <p class="tagline">Fast, simple, reliable.</p>
    <div class="divider"></div>
    <nav>
      <a href="products.html">Browse Menu <span class="arrow">→</span></a>
      <a href="order.html">Place an Order <span class="arrow">→</span></a>
      <a href="statistics.html">Statistics <span class="arrow">→</span></a>
    </nav>
    <footer>MySQL · Express · v1.0</footer>
  </div>
</body>
</html>
